name: Stock check

on:
  schedule:
    # GitHub may delay scheduled runs during high load - treat this as
    # "roughly every 10 minutes", not a guarantee.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

# Prevent overlapping runs (e.g. a slow check still running when the next
# cron tick fires) from racing on the cached state file.
concurrency:
  group: stock-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Restore last-known stock state
        uses: actions/cache/restore@v4
        with:
          path: data/state.json
          key: stock-state-${{ github.run_id }}
          restore-keys: |
            stock-state-

      - name: Run one check cycle
        env:
          RUN_ONCE: "true"
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm start

      - name: Save last-known stock state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/state.json
          key: stock-state-${{ github.run_id }}
